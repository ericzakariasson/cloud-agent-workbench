<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Minesweeper</title>
  <style>
    :root {
      --bg: #0f1a24;
      --panel: #1e2b36;
      --panel-light: #3a4f62;
      --bevel-light: #6c859a;
      --bevel-dark: #0d151c;
      --screen: #0a1218;
      --screen-text: #57ff90;
      --cell: #2a3e4f;
      --cell-revealed: #1a2a36;
      --danger: #ff4d67;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Courier New", Courier, monospace;
      background:
        radial-gradient(circle at 20% 15%, #233849 0, transparent 45%),
        radial-gradient(circle at 80% 85%, #1a2c3b 0, transparent 40%),
        var(--bg);
      color: #e4f0f5;
      padding: 24px;
    }

    .machine {
      width: min(95vw, 820px);
      border: 3px solid var(--panel-light);
      border-right-color: var(--bevel-dark);
      border-bottom-color: var(--bevel-dark);
      border-left-color: var(--bevel-light);
      border-top-color: var(--bevel-light);
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      padding: 14px;
      user-select: none;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .screen {
      background: var(--screen);
      color: var(--screen-text);
      border: 2px solid #0b1923;
      padding: 8px 10px;
      min-height: 46px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.1;
      text-shadow: 0 0 6px rgba(87, 255, 144, 0.55);
      font-size: 14px;
    }

    .screen strong {
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    button,
    select {
      font: inherit;
      color: #e4f0f5;
      background: #2d4355;
      border: 2px solid var(--panel-light);
      border-top-color: var(--bevel-light);
      border-left-color: var(--bevel-light);
      border-right-color: var(--bevel-dark);
      border-bottom-color: var(--bevel-dark);
      padding: 6px 10px;
      cursor: pointer;
      min-height: 36px;
    }

    button:active {
      border-top-color: var(--bevel-dark);
      border-left-color: var(--bevel-dark);
      border-right-color: var(--bevel-light);
      border-bottom-color: var(--bevel-light);
      transform: translateY(1px);
    }

    .board-wrap {
      background: #15222e;
      border: 2px solid var(--bevel-dark);
      padding: 10px;
      overflow: auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 34px);
      width: max-content;
      gap: 2px;
      background: #10202c;
      padding: 2px;
    }

    .cell {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: bold;
      background: var(--cell);
      border: 2px solid #4c6579;
      border-top-color: #6b879d;
      border-left-color: #6b879d;
      border-right-color: #15222e;
      border-bottom-color: #15222e;
      color: #cfe5f2;
      cursor: pointer;
    }

    .cell.revealed {
      background: var(--cell-revealed);
      border: 1px solid #263949;
      cursor: default;
    }

    .cell.mine {
      background: #4d1723;
      color: var(--danger);
    }

    .cell.flagged {
      color: #ffd166;
    }

    .n1 { color: #63b3ff; }
    .n2 { color: #57ff90; }
    .n3 { color: #ff9f6e; }
    .n4 { color: #cf9bff; }
    .n5 { color: #ff6f91; }
    .n6 { color: #6ff9ff; }
    .n7 { color: #fff685; }
    .n8 { color: #d8e3f0; }

    .note {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.85;
      text-align: center;
    }

    @media (max-width: 620px) {
      .top {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="machine">
    <div class="top">
      <div class="screen">
        <strong>RETRO MINESWEEPER</strong>
        <span id="statusText">Click any cell to begin.</span>
      </div>
      <button id="newGameBtn" type="button">:) New game</button>
      <div class="screen">
        <strong id="statsText">Mines: 0 | Time: 0s</strong>
        <span>Goal: reveal every safe tile.</span>
      </div>
    </div>

    <div class="controls">
      <label for="difficulty">Difficulty:</label>
      <select id="difficulty">
        <option value="beginner">Beginner 9x9 (10 mines)</option>
        <option value="intermediate">Intermediate 12x12 (24 mines)</option>
        <option value="expert">Expert 16x16 (48 mines)</option>
      </select>
      <button id="hintBtn" type="button">Reveal safe tile</button>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" aria-label="Minesweeper board"></div>
    </div>

    <div class="note">Left click reveals. Right click toggles flags. Hint reveals one guaranteed safe tile.</div>
  </div>

  <script>
    const SETTINGS = {
      beginner: { rows: 9, cols: 9, mines: 10 },
      intermediate: { rows: 12, cols: 12, mines: 24 },
      expert: { rows: 16, cols: 16, mines: 48 }
    };

    const boardEl = document.getElementById("board");
    const statusTextEl = document.getElementById("statusText");
    const statsTextEl = document.getElementById("statsText");
    const difficultyEl = document.getElementById("difficulty");
    const newGameBtnEl = document.getElementById("newGameBtn");
    const hintBtnEl = document.getElementById("hintBtn");

    let game = null;

    function createGame(mode) {
      const config = SETTINGS[mode];
      const grid = Array.from({ length: config.rows }, (_, r) =>
        Array.from({ length: config.cols }, (_, c) => ({
          row: r,
          col: c,
          isMine: false,
          isRevealed: false,
          isFlagged: false,
          adjacent: 0
        }))
      );
      return {
        mode,
        ...config,
        grid,
        started: false,
        ended: false,
        won: false,
        revealedCount: 0,
        startTime: 0,
        timer: 0,
        timerId: null
      };
    }

    function neighbors(row, col) {
      const cells = [];
      for (let r = row - 1; r <= row + 1; r += 1) {
        for (let c = col - 1; c <= col + 1; c += 1) {
          if (r === row && c === col) continue;
          if (r >= 0 && r < game.rows && c >= 0 && c < game.cols) cells.push(game.grid[r][c]);
        }
      }
      return cells;
    }

    function placeMines(excludeRow, excludeCol) {
      const forbidden = new Set(
        [game.grid[excludeRow][excludeCol], ...neighbors(excludeRow, excludeCol)].map((cell) => `${cell.row},${cell.col}`)
      );

      let placed = 0;
      while (placed < game.mines) {
        const row = Math.floor(Math.random() * game.rows);
        const col = Math.floor(Math.random() * game.cols);
        const key = `${row},${col}`;
        const cell = game.grid[row][col];
        if (cell.isMine || forbidden.has(key)) continue;
        cell.isMine = true;
        placed += 1;
      }

      for (let r = 0; r < game.rows; r += 1) {
        for (let c = 0; c < game.cols; c += 1) {
          const cell = game.grid[r][c];
          if (!cell.isMine) {
            cell.adjacent = neighbors(r, c).filter((n) => n.isMine).length;
          }
        }
      }
    }

    function render() {
      boardEl.style.gridTemplateColumns = `repeat(${game.cols}, 34px)`;
      boardEl.innerHTML = "";

      let flaggedCount = 0;
      for (let r = 0; r < game.rows; r += 1) {
        for (let c = 0; c < game.cols; c += 1) {
          const cell = game.grid[r][c];
          const btn = document.createElement("button");
          btn.className = "cell";
          btn.type = "button";
          btn.dataset.row = String(r);
          btn.dataset.col = String(c);
          btn.setAttribute("aria-label", `Cell row ${r + 1}, col ${c + 1}`);

          if (cell.isRevealed) {
            btn.classList.add("revealed");
            if (cell.isMine) {
              btn.classList.add("mine");
              btn.textContent = "✹";
            } else if (cell.adjacent > 0) {
              btn.classList.add(`n${cell.adjacent}`);
              btn.textContent = String(cell.adjacent);
            }
          } else if (cell.isFlagged) {
            btn.classList.add("flagged");
            btn.textContent = "⚑";
            flaggedCount += 1;
          }

          boardEl.appendChild(btn);
        }
      }

      const minesLeft = Math.max(game.mines - flaggedCount, 0);
      statsTextEl.textContent = `Mines: ${minesLeft} | Time: ${game.timer}s`;
    }

    function setStatus(text) {
      statusTextEl.textContent = text;
    }

    function updateTimer() {
      if (!game.started || game.ended) return;
      game.timer = Math.floor((Date.now() - game.startTime) / 1000);
      render();
    }

    function revealCell(row, col) {
      const cell = game.grid[row][col];
      if (game.ended || cell.isFlagged || cell.isRevealed) return;

      if (!game.started) {
        game.started = true;
        game.startTime = Date.now();
        placeMines(row, col);
        game.timerId = window.setInterval(updateTimer, 250);
      }

      cell.isRevealed = true;
      game.revealedCount += 1;

      if (cell.isMine) {
        loseGame();
        return;
      }

      if (cell.adjacent === 0) {
        for (const n of neighbors(row, col)) {
          if (!n.isRevealed && !n.isFlagged) revealCell(n.row, n.col);
        }
      }

      checkWin();
      render();
    }

    function toggleFlag(row, col) {
      const cell = game.grid[row][col];
      if (game.ended || cell.isRevealed) return;
      cell.isFlagged = !cell.isFlagged;
      render();
    }

    function loseGame() {
      game.ended = true;
      game.won = false;
      clearInterval(game.timerId);
      for (let r = 0; r < game.rows; r += 1) {
        for (let c = 0; c < game.cols; c += 1) {
          const cell = game.grid[r][c];
          if (cell.isMine) cell.isRevealed = true;
        }
      }
      setStatus("Boom. You hit a mine. Press New game.");
      newGameBtnEl.textContent = "X_X New game";
      render();
    }

    function checkWin() {
      const safeCells = game.rows * game.cols - game.mines;
      if (game.revealedCount === safeCells) {
        game.ended = true;
        game.won = true;
        clearInterval(game.timerId);
        setStatus(`You win in ${game.timer}s. Board cleared.`);
        newGameBtnEl.textContent = "B) New game";
      }
    }

    function revealSafeTile() {
      if (game.ended) return;
      const choices = [];
      for (let r = 0; r < game.rows; r += 1) {
        for (let c = 0; c < game.cols; c += 1) {
          const cell = game.grid[r][c];
          if (!cell.isRevealed && !cell.isFlagged && (!game.started || !cell.isMine)) {
            choices.push(cell);
          }
        }
      }
      if (!choices.length) return;
      const pick = choices[Math.floor(Math.random() * choices.length)];
      revealCell(pick.row, pick.col);
    }

    function resetGame() {
      clearInterval(game?.timerId);
      game = createGame(difficultyEl.value);
      newGameBtnEl.textContent = ":) New game";
      setStatus("Click any cell to begin.");
      render();
    }

    boardEl.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement) || !target.classList.contains("cell")) return;
      const row = Number(target.dataset.row);
      const col = Number(target.dataset.col);
      revealCell(row, col);
    });

    boardEl.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      const target = event.target;
      if (!(target instanceof HTMLElement) || !target.classList.contains("cell")) return;
      const row = Number(target.dataset.row);
      const col = Number(target.dataset.col);
      toggleFlag(row, col);
    });

    newGameBtnEl.addEventListener("click", resetGame);
    difficultyEl.addEventListener("change", resetGame);
    hintBtnEl.addEventListener("click", revealSafeTile);

    resetGame();
  </script>
</body>
</html>
